name: Static analysis

on: push

jobs:
  call-secrets-analysis-workflow:
    # Docs: https://github.com/ASFHyP3/actions
    uses: ASFHyP3/actions/.github/workflows/reusable-secrets-analysis.yml@v0.21.1
    permissions:
      contents: read

  call-ruff-workflow:
    # Docs: https://github.com/ASFHyP3/actions
    uses: ASFHyP3/actions/.github/workflows/reusable-ruff.yml@v0.21.1
    permissions:
      contents: read

  call-mypy-workflow:
    uses: ASFHyP3/actions/.github/workflows/reusable-mypy.yml@v0.21.1
    permissions:
      contents: read

  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml

      - shell: bash -l {0}
        run: |
          cfn-lint --info --ignore-checks W3002 --template `find . -name cloudformation.yml`
